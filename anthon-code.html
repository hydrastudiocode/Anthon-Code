        <!-- Script para conectar sidebar-filter-btn y sidebar-logout-btn al JS existente -->
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Sidebar filter btn → abre el mismo popup de filtros
                var sbFilter = document.getElementById('sidebar-filter-btn');
                var mainFilter = document.getElementById('filter-btn');
                if (sbFilter && mainFilter) {
                    sbFilter.addEventListener('click', function() { mainFilter.click(); });
                }
                // Sidebar logout → activa el mismo botón de logout
                var sbLogout = document.getElementById('sidebar-logout-btn');
                var mainLogout = document.getElementById('logout-btn');
                if (sbLogout && mainLogout) {
                    sbLogout.addEventListener('click', function() { mainLogout.click(); });
                }
                // Sincronizar clase active del sidebar con los links del nav (si siguen existiendo en el DOM)
                function syncSidebarActive() {
                    var links = ['view-scripts-link','add-script-link','favorites-link'];
                    links.forEach(function(id) {
                        var navEl = document.getElementById(id);
                        if (navEl) {
                            navEl.addEventListener('click', function() {
                                document.querySelectorAll('.sidebar-link').forEach(function(el) { el.classList.remove('active'); });
                                // Buscar el matching sidebar link por id
                                var sidebarEl = document.querySelector('.sidebar #' + id);
                                if (sidebarEl) sidebarEl.classList.add('active');
                            });
                        }
                    });
                }
                syncSidebarActive();
            });
        </script>
