<body>
    <header>
        <div class="header-left">
            <div class="logo-container">
                <img src="assets/logowar.png" alt="Anthon Code Logo" class="app-logo">
                <h1 class="app-title">Anthon Code 1.0.1</h1>
            </div>
            <div class="header-controls">
                <div class="custom-select-wrapper">
                    <select id="language-filter" class="custom-select">
                        <option value="all" data-icon="assets/logowar.png">General</option>
                        <option value="C" data-icon="assets/c.png">C</option>
                        <option value="C#" data-icon="assets/c2.png">C#</option>
                        <option value="C++" data-icon="gif/mine3.gif">C++</option>
                        <option value="JavaScript" data-icon="assets/JavaScript.png">JavaScript</option>
                        <option value="FireBase" data-icon="assets/fire.png">FireBase</option>
                        <option value="Python" data-icon="assets/python.png">Python</option>
                        <option value="PHP" data-icon="assets/php.png">PHP</option>
                        <option value="GdScript" data-icon="gif/mine.gif">Gd Script</option>
                        <option value="HTML" data-icon="gif/mine2.gif">HTML</option>
                        <option value="CSS" data-icon="gif/abeja.gif">CSS</option>
                        <option value="Otro" data-icon="gif/linux.gif">Apuntes</option>
                    </select>
                </div>
            </div>
        </div>
        <nav>
            <a href="#" id="view-scripts-link" class="active">Ver Scripts</a>
            <a href="#" id="add-script-link">Agregar Script</a>
        </nav>
        <div class="header-actions">
            <a href="https://github.com/hydrastudiocode/Anthon-Code" class="icon-btn github-btn" id="github-link">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </a>
            <button class="icon-btn logout-action-btn" id="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Salir</span>
            </button>
        </div>
    </header>
    <!-- ############### SEPARADOR DE CODIGO ################# -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const languageFilter = document.getElementById('language-filter');
            languageFilter.addEventListener('change', function() {
                const selectedOption = this.options[this.selectedIndex];
                const iconUrl = selectedOption.getAttribute('data-icon');
                this.style.backgroundImage = `url(${iconUrl})`;
                this.style.backgroundRepeat = 'no-repeat';
                this.style.backgroundPosition = '10px center';
                this.style.backgroundSize = '20px';
            });
            const event = new Event('change');
            languageFilter.dispatchEvent(event);
        });
    </script>
    <!-- ############### SEPARADOR DE CODIGO ################# -->
    <main>
        <div id="scripts-section" class="container">
            <div class="scripts-container" id="scripts-container">
            </div>
        </div>
        <div id="add-script-section" class="container" style="display: none;">
            <form id="script-form">
                <div class="form-group">
                    <label for="script-title">Nombre Script:</label>
                    <input type="text" id="script-title" required placeholder="Solo escribe el nombre eje: (Pruebas) sin el (.js)">
                </div>
                
                <div class="form-group">
                    <label for="script-author">Autor:</label>
                    <input type="text" id="script-author" placeholder="Nombre del autor">
                </div>
                
                <div class="form-group">
                    <label for="script-notes">Observaciones:</label>
                   <textarea id="script-notes"></textarea>
                </div>
                
                <div class="form-group custom-select2 ">
                    <label for="script-category">Lenguajes y Formatos:</label>
                    <select id="script-category" required>
                        <option value="">lenguajes -></option>
                        <option value="C">C</option>
                        <option value="C#">C#</option>
                        <option value="C++">C++</option>
                        <option value="Python">Python</option>
                        <option value="PHP">PHP</option>
                        <option value="GdScript">Gd Script</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="FireBase">FireBase Conf</option>
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="Otro">Apuntes</option>
                    </select>
                </div>
                    <!-- ############### SEPARADOR DE CODIGO ################# -->
                <div class="form-group">
                    <label for="script-content">Codigo:</label>
                    <textarea id="script-content"></textarea>
                </div>
                
                <button type="submit">Guardar Script</button>
                <p id="form-status"></p>
            </form>
        </div>
    </main>
    <!-- ############### SEPARADOR DE CODIGO ################# -->
    <div id="script-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title" style="text-align: center; color: #ffffff;">Detalles del Script</h2>
            
            <div class="script-info">
                <p class="script-author" id="modal-author" style="text-align: center;"></p>
                <p class="script-notes" id="modal-notes" style="text-align: center; white-space: pre-line;"></p>
            </div>
            
            <div class="code-viewer">
               <!-- En lugar de <pre><code id="modal-code"></code></pre> -->
<div id="modal-editor-container" style="height: 500px; border-radius: 8px;"></div>
            </div>
            <div class="modal-actions">
                <button id="copy-btn" class="copy-btn">Copiar</button>
                <button id="edit-btn" class="edit-btn">Editar</button>
                 <button id="download-btn" class="copy-btn">Descargar</button>
                <button id="modal-delete-btn" class="delete-btn">Eliminar</button>
            </div>
        </div>
    </div>
    <!-- ############### SEPARADOR DE CODIGO ################# -->
    <div id="edit-script-section" class="container" style="display: none;">
        <form id="edit-script-form">
            <input type="hidden" id="edit-script-id">
            <div class="form-group">
                <label for="edit-script-title">Nombre Script:</label>
                <input type="text" id="edit-script-title" required placeholder="############">
            </div>
            
            <div class="form-group">
                <label for="edit-script-author">Autor:</label>
                <input type="text" id="edit-script-author" placeholder="Nombre del autor">
            </div>
            
            <div class="form-group">
                <label for="edit-script-notes">Observaciones:</label>
                <textarea id="edit-script-notes" placeholder="Notas sobre el código (usa saltos de línea)" rows="3"></textarea>
            </div>

            <div class="form-group custom-select2 ">
                <label for="edit-script-category">Lenguaje:</label>
                <select id="edit-script-category" required>
                    <option value="">lenguajes -></option>
                    <option value="C">C</option>
                    <option value="C#">C#</option>
                    <option value="C++">C++</option>
                    <option value="Python">Python</option>
                    <option value="PHP">PHP</option>
                    <option value="GdScript">Gd Script</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="FireBase">FireBase Conf</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="Otro">Apuntes</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="edit-script-content">Codigo:</label>
                <textarea id="edit-script-content" spellcheck="false" autocorrect="off" autocapitalize="off" placeholder="############" rows="15"></textarea>
            </div>
            
            <button type="submit">Actualizar Script</button>
            <button type="button" id="cancel-edit-btn">Cancelar</button>
            <p id="edit-form-status"></p>
        </form>
    </div>
